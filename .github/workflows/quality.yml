name: Code quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Formatting, linting, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pi_app/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r pi_app/requirements.txt -r requirements-dev.txt

      - name: Run formatting and lint checks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run deterministic tests
        run: python -m unittest discover -s pi_app/tests -v
