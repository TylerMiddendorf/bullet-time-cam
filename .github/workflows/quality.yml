name: Code quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Formatting, linting, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pi_app/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r pi_app/requirements.txt -r requirements-dev.txt

      - name: Run formatting and lint checks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Run deterministic tests
        run: python -m unittest discover -s pi_app/tests -v

  firmware:
    name: Compile XIAO ESP32S3 firmware
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install pinned ESP32 core
        run: |
          arduino-cli config init
          arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core install esp32:esp32@3.3.10 --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json

      - name: Compile camera firmware
        run: arduino-cli compile --fqbn "esp32:esp32:XIAO_ESP32S3:PSRAM=opi" button_capture
